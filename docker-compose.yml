services:
  agents:
    build: .
    command: python main.py
    env_file: .env
    volumes:
      - db_data:/data
    environment:
      - DB_PATH=/data/database.db
    restart: unless-stopped

  web:
    build: .
    command: python app.py
    env_file: .env
    volumes:
      - db_data:/data
    environment:
      - DB_PATH=/data/database.db
    restart: unless-stopped
    depends_on:
      - agents

  tunnel-web:
    image: cloudflare/cloudflared:latest
    command: tunnel --url http://web:5000
    environment:
      - TUNNEL_TRANSPORT_PROTOCOL=http2
    restart: unless-stopped
    depends_on:
      - web

volumes:
  db_data:
